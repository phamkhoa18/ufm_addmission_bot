# 🔴 FALLBACK MESSAGES — Tin nhắn trả thẳng (không gọi LLM)
fallback_messages:
  # Layer 0: Input quá dài
  too_long: >
    Câu hỏi của bạn quá dài (vượt quá 3000 ký tự).
    Vui lòng tóm tắt ý chính để AI hỗ trợ nhanh nhất nhé.

  # Layer 1a: Từ khóa nhạy cảm
  banned_content: >
    Xin lỗi, câu hỏi của bạn chứa nội dung không phù hợp
    hoặc vi phạm tiêu chuẩn cộng đồng.
    Vui lòng chỉ đặt câu hỏi liên quan đến tuyển sinh UFM.

  # Layer 1b: Injection/Jailbreak
  injection: >
    Hệ thống phát hiện câu hỏi có dấu hiệu can thiệp bất thường.
    Vui lòng đặt câu hỏi tự nhiên liên quan đến tuyển sinh UFM.

  # Layer 2a: Llama Guard score cao
  guard_fast_unsafe: >
    Hệ thống phát hiện dấu hiệu tấn công rõ ràng trong câu hỏi của bạn.
    Vui lòng đặt câu hỏi tự nhiên liên quan đến tuyển sinh UFM.

  # Layer 2b: Qwen Deep phát hiện UNSAFE
  guard_deep_unsafe: >
    Hệ thống phát hiện câu hỏi có dấu hiệu bất thường hoặc vi phạm chính sách bảo mật.
    Vui lòng diễn đạt lại một cách tự nhiên hơn nhé.

  # Intent Nhóm 4: Block Fallback Messages
  cau_hoi_lac_de: >
    Mình là Trợ lý AI Tuyển sinh của UFM, chuyên hỗ trợ thông tin về ngành học,
    học phí, điều kiện xét tuyển và thủ tục nhập học. Câu hỏi này nằm ngoài
    phạm vi mình có thể hỗ trợ, bạn thử hỏi về tuyển sinh nhé!

  boi_nho_doi_thu: >
    UFM luôn tôn trọng tất cả các cơ sở giáo dục. Mỗi trường đều có thế mạnh riêng,
    mình không thể đưa ra những nhận xét so sánh mang tính hạ thấp.
    Bạn muốn tìm hiểu thêm về điểm mạnh của UFM không? Mình rất vui được giới thiệu!

  doi_hoi_cam_ket: >
    Cơ hội nghề nghiệp và thu nhập phụ thuộc rất lớn vào năng lực và sự nỗ lực của bạn.
    Mình không thể đưa ra cam kết tuyệt đối, nhưng chương trình đào tạo UFM
    luôn được cập nhật sát nhu cầu doanh nghiệp để tối ưu cơ hội việc làm cho bạn.
    Bạn muốn tìm hiểu chương trình đào tạo cụ thể của ngành nào không?

  tan_cong_he_thong: >
    Mình nhận thấy câu hỏi có dấu hiệu bất thường. Bạn vui lòng đặt lại câu hỏi
    theo hướng tự nhiên về tuyển sinh nhé, mình sẽ hỗ trợ bạn ngay!

  out_of_scope: >
    Câu hỏi nằm ngoài phạm vi hỗ trợ tuyển sinh UFM.
    Vui lòng đặt câu hỏi liên quan đến ngành học, học phí, hoặc quy chế tuyển sinh.


